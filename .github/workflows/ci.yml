name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Checkout TLAPS repository
        uses: actions/checkout@v4
        with:
          repository: tlaplus/tlapm
          path: tlapm

      - name: Download Community Modules
        run: |
          curl -sLO https://github.com/tlaplus/CommunityModules/releases/latest/download/CommunityModules-deps.jar
          unzip -o CommunityModules-deps.jar -d CommunityModules

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@417ae3ccd767c252f5661f1ace9f835f9654f2b5 # v3.1.0

      - name: Build with Gradle Wrapper
        env:
          TLAPS_LIBRARY: ${{ github.workspace }}/tlapm/library
          TLA_COMMUNITY_MODULES: ${{ github.workspace }}/CommunityModules
        run: ./gradlew build

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results/test/
          retention-days: 30

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: tlaplus-formatter-jar
          path: build/libs/tlaplus-formatter.jar
          retention-days: 90
          if-no-files-found: error