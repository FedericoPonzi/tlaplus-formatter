name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v4

      - name: Checkout TLAPS repository
        uses: actions/checkout@v4
        with:
          repository: tlaplus/tlapm
          path: tlapm

      - name: Download Community Modules
        run: |
          curl -sLO https://github.com/tlaplus/CommunityModules/releases/latest/download/CommunityModules-deps.jar
          unzip -o CommunityModules-deps.jar -d CommunityModules

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle Wrapper
        env:
          TLAPS_LIBRARY: ${{ github.workspace }}/tlapm/library
          TLA_COMMUNITY_MODULES: ${{ github.workspace }}/CommunityModules
        run: ./gradlew build

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: build/reports/spotbugs/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results/test/
          retention-days: 30

      - name: Test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: build/reports/jacoco/test/
          retention-days: 30

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: tlaplus-formatter-jar
          path: build/libs/tlaplus-formatter.jar
          retention-days: 90
          if-no-files-found: error